<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with Jami — Homemade CEO</title>
  <meta name="description" content="Talk to Jami, your AI business partner. Get your product validated and your listing created.">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/chat.css">
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="chat-page">
  <script>
    window.addEventListener('error', function(e) {
      document.body.insertAdjacentHTML('afterbegin', '<div style="color:red;background:yellow;padding:10px;z-index:9999;position:fixed;top:0;left:0;">' + e.message + ' at ' + e.filename + ':' + e.lineno + '</div>');
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.body.insertAdjacentHTML('afterbegin', '<div style="color:red;background:yellow;padding:10px;z-index:9999;position:fixed;top:50px;left:0;">Promise Rejection: ' + e.reason + '</div>');
    });
  </script>

  <!-- ═══ TOP NAV BAR ══════════════════════════════════════ -->
  <header class="chat-topbar">
    <div class="topbar-left">
      <a href="index.html" class="topbar-back" title="Back to home">
        <i data-lucide="arrow-left" class="icon-md"></i>
      </a>
      <div class="topbar-divider"></div>
      <div class="topbar-jami">
        <img class="topbar-avatar" src="assets/jami-avatar.png" alt="Jami"
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 36 36%22><circle cx=%2218%22 cy=%2218%22 r=%2218%22 fill=%22%23C8860A%22/><text x=%2218%22 y=%2223%22 text-anchor=%22middle%22 font-size=%2215%22 fill=%22white%22 font-family=%22Georgia%22>J</text></svg>'">
        <div>
          <div class="topbar-name">Jami</div>
          <div class="topbar-status">
            <span class="status-dot"></span>
            <span>Your AI Business Partner · Homemade CEO</span>
          </div>
        </div>
      </div>
    </div>

    <div class="topbar-right" style="display:flex; align-items:center; gap:12px;">
      <!-- Chat with Human -->
      <button class="btn btn-gold" style="padding:6px 16px; font-size:14px; border-radius:8px;" data-i18n="btn-human">Talk to a Human</button>

      <!-- Role pill as Avatar -->
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; margin-left:8px;">
        <div style="width:32px; height:32px; border-radius:50%; background:var(--slate-200); display:flex; align-items:center; justify-content:center; color:var(--slate-600);">
          <i data-lucide="user" class="icon-sm"></i>
        </div>
        <span style="font-size:10px; font-weight:700; color:var(--slate-800); background:white; padding:2px 6px; border-radius:10px; margin-top:-6px; z-index:2; text-transform:uppercase;">SELLER</span>
      </div>
      
      <!-- Settings & Display Options -->
      <div style="position: relative;">
        <button class="icon-btn" id="three-dot-btn" title="Options" aria-label="Open options menu" style="color:white;">
          <i data-lucide="more-vertical" class="icon-md"></i>
        </button>
        <!-- Dropdown Menu -->
        <div id="options-dropdown" class="options-dropdown" style="display: none;">
          <div class="dropdown-section">
            <div class="dropdown-title">Language / ഭാഷ</div>
            <button class="dropdown-item" id="menu-lang-en">English</button>
            <button class="dropdown-item" id="menu-lang-ml">മലയാളം (Malayalam)</button>
          </div>
          <div class="dropdown-section">
            <div class="dropdown-title">Voice / ശബ്ദം</div>
            <button class="dropdown-item" id="menu-voice-toggle">
              <i data-lucide="volume-2" class="icon-sm" style="display:inline-block; vertical-align:middle; margin-right:6px;"></i> <span id="voice-toggle-text">Voice: ON</span>
            </button>
          </div>
          <div class="dropdown-section">
            <div class="dropdown-title">Text Size</div>
            <button class="dropdown-item" id="menu-size-sm">Small</button>
            <button class="dropdown-item" id="menu-size-mid">Mid</button>
            <button class="dropdown-item" id="menu-size-md">Medium</button>
            <button class="dropdown-item" id="menu-size-lg">Large</button>
            <button class="dropdown-item" id="menu-size-xl">Extra Large</button>
          </div>
          <div class="dropdown-section" style="border-top: 1px solid var(--slate-800); padding-top: 8px;">
            <button class="dropdown-item" id="menu-reset-chat" style="color: #ef4444; font-weight: 500;">
              <i data-lucide="refresh-cw" class="icon-sm" style="display:inline-block; vertical-align:middle; margin-right:6px;"></i> Reset Chat
            </button>
          </div>
        </div>
      </div>

      <!-- Mode badge (hidden in UI usually, keep for dev) -->
      <span class="mode-pill" id="api-mode-badge" style="display:none;">MOCK</span>
    </div>
  </header>

  <!-- ═══ BODY (VOICE-FORWARD REDESIGN) ══════════════════════════════════════════════ -->
  <div class="chat-body new-layout">
    
    <!-- LEFT FLANK (Desktop Only) -->
    <div class="flank left-flank" id="left-flank" aria-hidden="true">
       <!-- AI generated illustrations will go here based on user input -->
    </div>

    <!-- CENTER COLUMN -->
    <div class="chat-container">
      
      <!-- Visual Stepper -->
      <div class="top-stepper" aria-label="Progress Tracker">
        <div class="stepper-icons">
          <div class="step-wrapper active" id="jstep-onboarding">
            <div class="step-icon"><i data-lucide="user" class="icon-md"></i></div>
            <div class="step-label">Profile</div>
          </div>
          <div class="step-line"></div>
          <div class="step-wrapper" id="jstep-intake">
            <div class="step-icon"><i data-lucide="package" class="icon-md"></i></div>
            <div class="step-label">Product</div>
          </div>
          <div class="step-line"></div>
          <div class="step-wrapper" id="jstep-costing">
            <div class="step-icon"><i data-lucide="indian-rupee" class="icon-md"></i></div>
            <div class="step-label">Pricing</div>
          </div>
          <div class="step-line"></div>
          <div class="step-wrapper" id="jstep-validated">
            <div class="step-icon"><i data-lucide="check-circle-2" class="icon-md"></i></div>
            <div class="step-label">Success</div>
          </div>
        </div>
      </div>

      <!-- Messages -->
      <main class="messages-area" id="messages" role="log" aria-label="Chat messages" aria-live="polite"></main>

      <!-- Input -->
      <footer class="chat-input-area voice-first-input">
        
        <!-- Chunky Quick Replies -->
        <div id="quick-replies-container" class="chunky-replies"></div>

        <div class="input-controls">
          
          <button class="attach-btn" id="attach-btn" title="Attach photo" aria-label="Attach product photo">
            <i data-lucide="image" class="icon-xl"></i>
          </button>
          <input type="file" id="file-input" accept="image/*" style="display:none" aria-label="Upload product photo">

          <!-- Massive Microphone -->
          <button class="mic-btn" id="mic-btn" aria-label="Tap to speak">
            <i data-lucide="mic" class="icon-xl"></i>
            <span class="mic-label" data-i18n="tap-to-speak">Tap to Speak</span>
          </button>

          <!-- Standard Text Input (hidden by default) -->
          <div class="msg-input-wrap hidden" id="keyboard-input-wrap">
            <input type="text" id="message-input"
                   placeholder="Type your reply to Jami…"
                   data-i18n="chat-input-placeholder"
                   autocomplete="off" spellcheck="true"
                   aria-label="Type your message">
            <button class="send-btn" id="send-btn" title="Send" aria-label="Send message">
              <i data-lucide="send" class="icon-sm"></i>
            </button>
          </div>

          <button class="keyboard-toggle-btn" id="keyboard-toggle-btn" title="Type instead" aria-label="Use keyboard">
            <i data-lucide="keyboard" class="icon-xl"></i>
          </button>

        </div>
      </footer>

    </div><!-- /chat-container -->

    <!-- RIGHT FLANK (Desktop Only) -->
    <div class="flank right-flank" id="right-flank" aria-hidden="true">
       <!-- AI generated illustrations will go here based on user input -->
    </div>

  </div><!-- /chat-body -->

  <!-- ═══ SETTINGS MODAL ═══════════════════════════════════ -->
  <div class="modal-backdrop hidden" id="settings-modal"
       role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-heading">
        <i data-lucide="cpu" class="icon-md" style="color:var(--gold)"></i>
        <h3 id="modal-title">LLM Configuration</h3>
      </div>
      <p class="modal-sub">Connect a real language model so Jami generates live responses. Leave blank to keep mock mode.</p>

      <div class="modal-field">
        <label class="modal-label" for="modal-provider">Provider</label>
        <select id="modal-provider" class="modal-input">
          <option value="openai">OpenAI — GPT-4o, GPT-4-turbo</option>
          <option value="anthropic">Anthropic — Claude 3.5, Claude 3</option>
          <option value="gemini">Google — Gemini 1.5-flash, 1.5-pro</option>
        </select>
      </div>

      <div class="modal-field">
        <label class="modal-label" for="modal-api-key">API Key</label>
        <input type="password" id="modal-api-key" class="modal-input"
               placeholder="sk-… or AIza… (kept only in memory)">
      </div>

      <div class="modal-field">
        <label class="modal-label" for="modal-model">
          Model Override
          <span style="font-weight:400;text-transform:none;letter-spacing:0;opacity:0.5">(optional)</span>
        </label>
        <input type="text" id="modal-model" class="modal-input"
               placeholder="gpt-4o · claude-3-5-sonnet-20241022 · gemini-1.5-flash">
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-close-btn">Cancel</button>
        <button class="btn btn-gold" id="modal-save-btn">
          <i data-lucide="zap" class="icon-sm"></i> Connect
        </button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="js/margin.js"></script>
  <script src="js/store.js"></script>
  <script src="js/jami.js"></script>
  <script src="js/chat-ui.js"></script>
  <script src="js/easter-eggs.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();

      const resetBtn = document.getElementById('sidebar-reset-btn');
      if (resetBtn) {
        resetBtn.addEventListener('click', () => {
          if (confirm('Start a fresh conversation with Jami?')) {
            Store.resetLiveSellers();
            location.reload();
          }
        });
      }
    });
  </script>
</body>
</html>
